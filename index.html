<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NyayMitra — Citizens Legal Rights Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0f1a;
      --surface:  #111827;
      --border:   #1e2d45;
      --accent:   #f97316;
      --user-bg:  #1a2744;
      --bot-bg:   #131f35;
      --text:     #e2e8f0;
      --muted:    #64748b;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo { font-size: 26px; }
    .header-text h1 { font-size: 1rem; font-weight: 700; }
    .header-text p  { font-size: 0.7rem; color: var(--muted); }
    .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: #22c55e; }
    .dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Topic chips */
    .chips {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Sora', sans-serif;
      font-size: 0.67rem;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
      transition: all .2s;
      flex-shrink: 0;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* Chat */
    #chat { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .msg { display: flex; gap: 10px; max-width: 780px; animation: up .25s ease; }
    @keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }
    .msg.bot  { margin-right: auto; }

    .av { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
    .msg.bot  .av { background: linear-gradient(135deg, var(--accent), #ef4444); }
    .msg.user .av { background: var(--user-bg); border: 1px solid var(--border); }

    .bbl { padding: 11px 15px; border-radius: 13px; font-size: 0.86rem; line-height: 1.65; max-width: 640px; }
    .msg.bot  .bbl { background: var(--bot-bg); border: 1px solid var(--border); border-top-left-radius: 3px; }
    .msg.user .bbl { background: var(--user-bg); border: 1px solid #2a3d5e; border-top-right-radius: 3px; }
    .bbl strong { color: #fb923c; }
    .bbl .disclaimer { font-size: .75rem; color: var(--muted); margin-top: 8px; border-top: 1px solid var(--border); padding-top: 6px; }

    /* Typing */
    .typing { display: flex; gap: 4px; align-items: center; padding: 13px 15px; }
    .typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.1s infinite; }
    .typing span:nth-child(2){animation-delay:.18s} .typing span:nth-child(3){animation-delay:.36s}
    @keyframes bounce { 0%,80%,100%{transform:none} 40%{transform:translateY(-5px)} }

    /* Feedback buttons */
    .feedback { display: flex; gap: 6px; margin-top: 6px; }
    .fb-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: .7rem; padding: 3px 8px; border-radius: 12px; cursor: pointer; transition: all .2s; }
    .fb-btn:hover { border-color: var(--accent); color: var(--accent); }
    .fb-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* Input */
    .input-wrap { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 14px; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    #inp { flex:1; background: var(--bg); border: 1px solid var(--border); border-radius: 11px; color: var(--text); font-family: 'Sora',sans-serif; font-size: .86rem; padding: 10px 14px; resize: none; max-height: 110px; outline: none; transition: border-color .2s; line-height: 1.5; }
    #inp:focus { border-color: var(--accent); }
    #inp::placeholder { color: var(--muted); }
    #send { background: linear-gradient(135deg, var(--accent), #ef4444); border: none; border-radius: 11px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform .15s, opacity .15s; }
    #send:hover { transform: scale(1.06); }
    #send:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    #send svg { width: 17px; height: 17px; fill: white; }

    /* Character counter */
    #char-count { font-size: .65rem; color: var(--muted); text-align: right; padding: 2px 14px 0; }
    #char-count.warn { color: #f97316; }

    .footer-note { text-align: center; font-size: .62rem; color: var(--muted); padding: 4px 0 6px; }
  </style>
</head>
<body>

<header>
  <div class="logo">⚖️</div>
  <div class="header-text">
    <h1>NyayMitra</h1>
    <p>Citizens Legal Rights &amp; Safety Assistant · India</p>
  </div>
  <div class="status"><div class="dot"></div><span id="status-text">Online</span></div>
</header>

<!-- Topic quick-access chips — loaded dynamically from /topics API -->
<div class="chips" id="chips-bar">
  <!-- Chips are injected here by JavaScript on page load -->
</div>

<div id="chat"></div>
<div id="char-count">0 / 1000</div>

<div class="input-wrap">
  <textarea id="inp" rows="1" placeholder="Describe your legal situation..."></textarea>
  <button id="send" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>
<div class="footer-note">NyayMitra provides legal awareness only — not professional legal advice · Free Legal Aid: 15100</div>

<script>
  // ─────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────

  let history = [];
  // Stores full conversation: [{role:"user",content:"..."}, {role:"assistant",content:"..."}]
  // Sent to backend on every request so the LLM has full context.

  let isLoading = false;
  // Prevents double-sends while the bot is typing.

  let feedbackGiven = new Set();
  // Tracks which message IDs have received feedback (thumbs up/down).
  // Prevents the user from rating the same message twice.

  // ─────────────────────────────────────────
  // ON PAGE LOAD
  // ─────────────────────────────────────────

  window.onload = async () => {
    await loadTopicChips();
    // Fetch topic list from /topics API and render quick-access chips.

    await sendToBackend(
      "Hello, introduce yourself as NyayMitra briefly and ask the user to describe their legal situation.",
      true
    );
    // Send a hidden starter message to trigger the bot's opening greeting.
    // 'true' = hidden, so this message doesn't appear in the chat.
  };

  // ─────────────────────────────────────────
  // LOAD TOPIC CHIPS FROM API
  // ─────────────────────────────────────────

  async function loadTopicChips() {
    try {
      const res = await fetch("/topics");
      const data = await res.json();
      // Fetch the list of legal topics from the backend /topics endpoint.

      const bar = document.getElementById("chips-bar");
      const topicQueries = {
        // Maps each category to a natural question for that topic.
        "workplace_harassment": "My boss is harassing me at work",
        "police_arrest":        "I was arrested by police, what are my rights?",
        "fir_complaint":        "Police is refusing to file my FIR",
        "cybercrime":           "I got scammed online, what do I do?",
        "consumer_rights":      "I want a refund for a defective product",
        "tenant_rights":        "My landlord is illegally threatening to evict me",
        "domestic_violence":    "I need help, I am being abused at home",
        "road_accident":        "I was in a road accident, what should I do?",
        "right_to_information": "How do I file an RTI application?",
        "labour_rights":        "My employer has not paid my salary",
        "land_property_rights": "My neighbour is encroaching on my land",
        "education_rights":     "My college is withholding my degree certificate",
        "disability_rights":    "What rights do I have as a person with disability?"
      };

      const icons = {
        "workplace_harassment":"🏢","police_arrest":"🚔","fir_complaint":"📋",
        "cybercrime":"💻","consumer_rights":"🛒","tenant_rights":"🏠",
        "domestic_violence":"🆘","road_accident":"🚗","right_to_information":"📄",
        "labour_rights":"👷","land_property_rights":"🏗️","education_rights":"🎓",
        "disability_rights":"♿"
      };
      // Emoji icons for each topic category.

      data.topics.forEach(topic => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.textContent = `${icons[topic.category] || "⚖️"} ${topic.title}`;
        btn.onclick = () => {
          if (!isLoading) {
            const q = topicQueries[topic.category] || `Tell me about ${topic.title}`;
            addMessage("user", q);
            // Show the question in chat as if the user typed it.
            sendToBackend(q, false);
          }
        };
        bar.appendChild(btn);
      });
      // Create a chip button for each topic and add it to the bar.

    } catch (e) {
      console.error("Failed to load topics:", e);
      // If the topics API fails, the chips bar just stays empty — not a critical error.
    }
  }

  // ─────────────────────────────────────────
  // SEND MESSAGE
  // ─────────────────────────────────────────

  async function sendMessage() {
    const input = document.getElementById("inp");
    const text = input.value.trim();

    if (!text || isLoading) return;

    input.value = "";
    input.style.height = "auto";
    updateCharCount(0);
    // Clear input and reset height.

    addMessage("user", text);
    await sendToBackend(text, false);
  }

  // ─────────────────────────────────────────
  // CORE: SEND TO FLASK BACKEND
  // ─────────────────────────────────────────

  async function sendToBackend(message, hidden) {
    isLoading = true;
    document.getElementById("send").disabled = true;
    document.getElementById("status-text").textContent = "Typing...";
    // Update status indicator while waiting for response.

    if (!hidden) showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history })
        // Send message + full conversation history to the Flask backend.
      });

      if (res.status === 429) {
        // 429 = Too Many Requests (rate limit hit)
        removeTyping();
        addMessage("bot", "⚠️ You're sending messages too fast. Please wait a moment before continuing.");
        return;
      }

      if (!res.ok) {
        // Any other HTTP error
        removeTyping();
        addMessage("bot", "Sorry, there was a server error. Please try again.");
        return;
      }

      const data = await res.json();
      removeTyping();

      const reply = data.reply;
      addMessage("bot", reply, true);
      // 'true' = show feedback buttons for bot messages.

      history.push({ role: "user", content: message });
      history.push({ role: "assistant", content: reply });
      // Add both messages to history for next API call.

    } catch (err) {
      removeTyping();
      addMessage("bot", "Could not connect to server. Make sure the backend is running.");
      console.error(err);
    } finally {
      isLoading = false;
      document.getElementById("send").disabled = false;
      document.getElementById("status-text").textContent = "Online";
      // Re-enable send and reset status indicator.
    }
  }

  // ─────────────────────────────────────────
  // ADD MESSAGE TO CHAT
  // ─────────────────────────────────────────

  let msgIdCounter = 0;
  // Counter to give each bot message a unique ID for feedback tracking.

  function addMessage(role, text, showFeedback = false) {
    const chatDiv = document.getElementById("chat");
    const msgId = ++msgIdCounter;

    const div = document.createElement("div");
    div.className = `msg ${role}`;

    const formattedText = formatText(text);
    // Convert markdown-like syntax to HTML.

    let feedbackHTML = "";
    if (showFeedback && role === "bot") {
      feedbackHTML = `
        <div class="feedback">
          <button class="fb-btn" onclick="giveFeedback(${msgId}, 'helpful', this)">👍 Helpful</button>
          <button class="fb-btn" onclick="giveFeedback(${msgId}, 'not_helpful', this)">👎 Not helpful</button>
        </div>
      `;
      // Feedback buttons appear below every bot response.
      // These simulate user feedback tracking (useful for report screenshots).
    }

    div.innerHTML = `
      <div class="av">${role === "bot" ? "⚖️" : "👤"}</div>
      <div>
        <div class="bbl">${formattedText}</div>
        ${feedbackHTML}
      </div>
    `;

    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
    // Auto-scroll to the latest message.
  }

  // ─────────────────────────────────────────
  // FEEDBACK HANDLER
  // ─────────────────────────────────────────

  function giveFeedback(msgId, type, btn) {
    if (feedbackGiven.has(msgId)) return;
    // Prevent rating the same message twice.

    feedbackGiven.add(msgId);
    btn.classList.add("active");
    // Highlight the clicked button.

    const otherBtn = btn.parentElement.querySelector(`.fb-btn:not(.active)`);
    if (otherBtn) otherBtn.disabled = true;
    // Disable the other button after a rating is given.

    console.log(`Message ${msgId} rated: ${type}`);
    // In a real system, you'd send this to an analytics endpoint.
    // For the assignment demo, this is enough to show the feature.
  }

  // ─────────────────────────────────────────
  // TEXT FORMATTER
  // ─────────────────────────────────────────

  function formatText(text) {
    // Detect and separate the disclaimer line for special styling
    const parts = text.split(/(⚠️ Note:.*?lawyer\.)/s);
    let main = parts[0];
    let disclaimer = parts[1] ? `<div class="disclaimer">${parts[1]}</div>` : "";

    main = main
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      // **bold** → <strong>bold</strong>

      .replace(/\n/g, "<br>")
      // Newlines → HTML line breaks

      .replace(/^(\d+\.\s)/gm, "<br>$1")
      // Add spacing before numbered lists

    return main + disclaimer;
  }

  // ─────────────────────────────────────────
  // TYPING INDICATOR
  // ─────────────────────────────────────────

  function showTyping() {
    const chatDiv = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg bot";
    div.id = "typing-indicator";
    div.innerHTML = `<div class="av">⚖️</div><div class="bbl"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chatDiv.appendChild(div);
    chatDiv.scrollTop = chatDiv.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  // ─────────────────────────────────────────
  // CHARACTER COUNTER
  // ─────────────────────────────────────────

  function updateCharCount(len) {
    const counter = document.getElementById("char-count");
    counter.textContent = `${len} / 1000`;
    counter.className = len > 800 ? "warn" : "";
    // Turns orange when user is near the 1000 char limit.
  }

  // ─────────────────────────────────────────
  // INPUT EVENTS
  // ─────────────────────────────────────────

  document.getElementById("inp").addEventListener("input", function () {
    // Auto-resize textarea as user types
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 110) + "px";

    // Update character counter
    updateCharCount(this.value.length);

    // Enforce 1000 char limit on frontend too
    if (this.value.length > 1000) {
      this.value = this.value.substring(0, 1000);
    }
  });

  document.getElementById("inp").addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      // Enter = send, Shift+Enter = new line
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
